<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board — Professional SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9FAFB;
        }
        
        /* Multi-layered soft shadow */
        .saas-card {
            box-shadow: 
                0 1px 3px 0 rgba(0, 0, 0, 0.1), 
                0 1px 2px 0 rgba(0, 0, 0, 0.06),
                0 10px 15px -3px rgba(0, 0, 0, 0.03);
        }

        /* Fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Custom focus styles */
        .input-focus:focus {
            background-color: white;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1);
            border-color: #6366F1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-3xl bg-white rounded-[16px] saas-card border border-gray-200 overflow-hidden">
        <!-- Header -->
        <div class="px-8 py-6 border-b border-gray-100 flex items-center justify-between bg-white">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">Group Idea Board</h1>
                <span id="ideaCounter" class="px-2 py-0.5 bg-slate-100 text-slate-500 text-xs font-semibold rounded-full border border-slate-200">0</span>
            </div>
            <div class="flex gap-2">
                <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                <span class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Live Board</span>
            </div>
        </div>

        <!-- Input Row -->
        <div class="p-8 bg-gray-50/30">
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-none w-full sm:w-48">
                    <select id="userSelect" class="w-full h-12 pl-4 pr-10 rounded-xl border border-gray-200 bg-gray-100/50 text-slate-600 text-sm appearance-none cursor-pointer input-focus transition-all outline-none">
                        <option value="" disabled selected>Member</option>
                        <option value="Alex Rivers">Alex Rivers</option>
                        <option value="Jordan Smith">Jordan Smith</option>
                        <option value="Taylor Wong">Taylor Wong</option>
                        <option value="Morgan Lee">Morgan Lee</option>
                    </select>
                    <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                </div>
                <div class="flex-grow">
                    <input type="text" id="ideaInput" placeholder="What's on your mind?" 
                        class="w-full h-12 px-4 rounded-xl border border-gray-200 bg-gray-100/50 text-slate-700 text-sm placeholder:text-slate-400 input-focus transition-all outline-none">
                </div>
                <button id="addIdeaBtn" class="h-12 px-8 bg-gradient-to-br from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white font-semibold text-sm rounded-xl transition-all duration-200 shadow-sm active:scale-95 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    Add Idea
                </button>
            </div>
            <p id="errorMessage" class="text-rose-500 text-[11px] mt-2 ml-1 font-medium hidden">Please select a member and describe your idea.</p>
        </div>

        <!-- Ideas List -->
        <div class="border-t border-gray-100">
            <ul id="ideasList" class="divide-y divide-gray-50">
                <!-- Empty State -->
                <li id="emptyState" class="px-8 py-20 text-center">
                    <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-slate-50 text-slate-300 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
                    </div>
                    <p class="text-slate-400 text-sm font-medium">No ideas collected yet</p>
                    <p class="text-slate-300 text-xs mt-1">Submit your first idea to get started.</p>
                </li>
            </ul>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userSelect = document.getElementById('userSelect');
            const ideaInput = document.getElementById('ideaInput');
            const addIdeaBtn = document.getElementById('addIdeaBtn');
            const ideasList = document.getElementById('ideasList');
            const emptyState = document.getElementById('emptyState');
            const errorMessage = document.getElementById('errorMessage');
            const ideaCounter = document.getElementById('ideaCounter');

            let count = 0;

            const updateCounter = (val) => {
                count += val;
                ideaCounter.textContent = count;
            };

            const addIdea = () => {
                const user = userSelect.value;
                const idea = ideaInput.value.trim();

                if (!user || !idea) {
                    errorMessage.classList.remove('hidden');
                    return;
                }

                errorMessage.classList.add('hidden');

                if (emptyState) {
                    emptyState.style.display = 'none';
                }

                const li = document.createElement('li');
                li.className = 'px-8 py-5 flex items-center justify-between hover:bg-gray-50/50 transition-colors animate-fade-in group';
                
                li.innerHTML = `
                    <div class="flex items-start gap-4">
                        <div class="mt-1 flex-none w-8 h-8 rounded-lg bg-indigo-50 text-indigo-500 flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-slate-700 font-medium text-[15px] leading-snug">${idea}</span>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-slate-400 text-xs">Suggested by</span>
                                <span class="text-slate-600 text-xs font-semibold">${user}</span>
                            </div>
                        </div>
                    </div>
                    <button class="delete-btn opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                    </button>
                `;

                // Add delete functionality
                li.querySelector('.delete-btn').addEventListener('click', () => {
                    li.classList.add('opacity-0', 'translate-x-4');
                    setTimeout(() => {
                        li.remove();
                        updateCounter(-1);
                        if (ideasList.children.length === 1 && emptyState) { // Only emptyState left
                            emptyState.style.display = 'block';
                        }
                    }, 200);
                });

                ideasList.insertBefore(li, emptyState.nextSibling);
                updateCounter(1);

                ideaInput.value = '';
                ideaInput.focus();
            };

            addIdeaBtn.addEventListener('click', addIdea);
            ideaInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addIdea();
            });
        });
    </script>
</body>
</html>
