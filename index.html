<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Group Idea Board</h1>
            <p>Collaborate and share your creative thoughts</p>
        </header>

        <main>
            <section class="input-section">
                <div class="input-group">
                    <input type="text" id="ideaInput" placeholder="Enter your amazing idea..." autocomplete="off">
                </div>
                
                <div class="controls">
                    <div class="select-group">
                        <label for="personSelect">Suggestor</label>
                        <select id="personSelect">
                            <option value="Alex Johnson">Alex Johnson</option>
                            <option value="Jordan Smith">Jordan Smith</option>
                            <option value="Taylor Reed">Taylor Reed</option>
                            <option value="Casey Lee">Casey Lee</option>
                            <option value="Morgan Drew">Morgan Drew</option>
                        </select>
                    </div>
                    
                    <div class="button-group">
                        <button id="addBtn" class="primary-btn">Add Idea</button>
                        <button id="clearBtn" class="secondary-btn">Clear</button>
                    </div>
                </div>
            </section>

            <section class="stats-section">
                <p>Total Ideas: <span id="totalCount">0</span></p>
            </section>

            <section class="ideas-section">
                <ul id="ideasList">
                    <!-- Ideas will be dynamically added here -->
                </ul>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Group Idea Board. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
