<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <nav class="navbar">
        <div class="logo">IdeaBoard</div>
        <div class="mode-toggle">
            <button id="themeToggle" class="toggle-btn">
                <span class="icon">🌙</span>
            </button>
        </div>
    </nav>

    <header class="header">
        <h1>Collaborative Brainstorming</h1>
        <p>Share your vision with the team</p>
    </header>

    <main class="container">
        <div class="grid">
            <!-- Member Management Section -->
            <section class="card">
                <h2>Team Members</h2>
                <div class="input-group">
                    <input type="text" id="newMemberInput" placeholder="Enter new member name...">
                    <button id="addMemberBtn">Add Member</button>
                </div>
                <div class="member-list-container">
                    <ul id="memberList">
                        <!-- Members will appear here -->
                    </ul>
                </div>
            </section>

            <!-- Idea Submission Section -->
            <section class="card">
                <h2>Submit Idea</h2>
                <div class="input-group">
                    <label for="memberSelect">Select Member</label>
                    <select id="memberSelect">
                        <option value="" disabled selected>Choose a member...</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="ideaInput">Your Idea</label>
                    <textarea id="ideaInput" placeholder="Describe your idea here..."></textarea>
                </div>
                <button id="submitIdeaBtn" class="primary-btn">Submit Idea</button>
            </section>
        </div>

        <!-- Idea Feed Section -->
        <section class="idea-feed card">
            <div class="feed-header">
                <div class="header-main">
                    <h2>Group Ideas</h2>
                    <div class="stats">
                        Total Ideas: <span id="totalIdeas">0</span>
                    </div>
                </div>
                <div class="filter-group">
                    <input type="text" id="filterInput" placeholder="Filter by member or keyword...">
                </div>
            </div>
            <div id="ideasList" class="ideas-list">
                <!-- Ideas will appear here -->
            </div>
            <div class="feed-actions">
                <button id="clearAllBtn" class="danger-btn">Clear All Ideas</button>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Group Idea Board. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
