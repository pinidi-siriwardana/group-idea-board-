<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .idea-card:nth-child(even) {
            background-color: #f1f5f9;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <!-- Header -->
        <div class="bg-slate-900 px-8 py-6">
            <h1 class="text-2xl font-bold text-white tracking-tight">Group Idea Board</h1>
            <p class="text-slate-400 text-sm mt-1">Collaborate and share your best thoughts with the team.</p>
        </div>

        <!-- Input Section -->
        <div class="p-8 border-b border-slate-100 bg-slate-50/50">
            <div class="flex flex-col md:flex-row gap-3">
                <div class="flex-none w-full md:w-40">
                    <select id="userSelect" class="w-full h-11 px-4 rounded-lg border border-slate-300 bg-white text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all appearance-none cursor-pointer">
                        <option value="" disabled selected>Select User</option>
                        <option value="Alex Rivers">Alex Rivers</option>
                        <option value="Jordan Smith">Jordan Smith</option>
                        <option value="Taylor Wong">Taylor Wong</option>
                        <option value="Morgan Lee">Morgan Lee</option>
                    </select>
                </div>
                <div class="flex-grow">
                    <input type="text" id="ideaInput" placeholder="Enter your idea..." 
                        class="w-full h-11 px-4 rounded-lg border border-slate-300 bg-white text-slate-700 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                </div>
                <button id="addIdeaBtn" class="h-11 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm rounded-lg transition-colors duration-200 shadow-sm active:transform active:scale-95">
                    Add Idea
                </button>
            </div>
            <p id="errorMessage" class="text-red-500 text-xs mt-2 hidden">Please select a user and enter an idea.</p>
        </div>

        <!-- Display List -->
        <div class="max-h-[500px] overflow-y-auto">
            <ul id="ideasList" class="divide-y divide-slate-100">
                <!-- Initial empty state -->
                <li id="emptyState" class="px-8 py-12 text-center">
                    <div class="text-slate-400 text-sm italic">No ideas yet. Be the first to suggest something!</div>
                </li>
            </ul>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userSelect = document.getElementById('userSelect');
            const ideaInput = document.getElementById('ideaInput');
            const addIdeaBtn = document.getElementById('addIdeaBtn');
            const ideasList = document.getElementById('ideasList');
            const emptyState = document.getElementById('emptyState');
            const errorMessage = document.getElementById('errorMessage');

            const addIdea = () => {
                const user = userSelect.value;
                const idea = ideaInput.value.trim();

                // Validation
                if (!user || !idea) {
                    errorMessage.classList.remove('hidden');
                    return;
                }

                errorMessage.classList.add('hidden');

                // Remove empty state if it's the first idea
                if (emptyState) {
                    emptyState.remove();
                }

                // Create list item
                const li = document.createElement('li');
                li.className = 'idea-card px-8 py-5 flex items-center justify-between group transition-colors duration-150';
                
                li.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-slate-800 font-medium text-base">${idea}</span>
                        <span class="text-slate-500 text-xs mt-1 uppercase tracking-wider font-semibold">Suggested by ${user}</span>
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-indigo-600 text-xs font-bold">New</span>
                    </div>
                `;

                // Prepend to list
                ideasList.insertBefore(li, ideasList.firstChild);

                // Clear inputs
                ideaInput.value = '';
                // Optional: Keep user selected for batch entries, or reset
                // userSelect.selectedIndex = 0; 
                
                ideaInput.focus();
            };

            addIdeaBtn.addEventListener('click', addIdea);

            // Add on Enter key
            ideaInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addIdea();
                }
            });
        });
    </script>
</body>
</html>
