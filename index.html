<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Dashboard — Modern SaaS Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Multi-layered soft shadow for the main dashboard */
        .dashboard-container {
            box-shadow: 
                0 0 0 1px rgba(0, 0, 0, 0.05),
                0 10px 15px -3px rgba(0, 0, 0, 0.04),
                0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }

        /* Brand-colored soft shadow for the button */
        .btn-indigo-shadow {
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }
        .btn-indigo-shadow:hover {
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.23);
        }

        /* Fade-in entry animation */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-entry {
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Custom scrollbar for the list area */
        .list-area::-webkit-scrollbar {
            width: 6px;
        }
        .list-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .list-area::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">

    <div class="w-full max-w-3xl bg-white rounded-2xl dashboard-container overflow-hidden">
        
        <!-- Header Section: Distinct Visual Zone -->
        <header class="px-8 py-8 border-b border-slate-100 bg-white">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Idea Dashboard</h1>
                    <p class="text-slate-500 text-sm mt-1">Capture and organize team brainstorms in real-time.</p>
                </div>
                <div class="h-10 w-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
                </div>
            </div>
        </header>

        <!-- Input Section: Distinct Visual Zone -->
        <section class="px-8 py-8 bg-slate-50/50 border-b border-slate-100">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-none w-full md:w-44">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Member</label>
                    <select id="userSelect" class="w-full h-11 px-4 rounded-lg border border-slate-200 bg-white text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all appearance-none cursor-pointer">
                        <option value="" disabled selected>Select...</option>
                        <option value="Alex Rivers">Alex Rivers</option>
                        <option value="Jordan Smith">Jordan Smith</option>
                        <option value="Taylor Wong">Taylor Wong</option>
                        <option value="Morgan Lee">Morgan Lee</option>
                    </select>
                </div>
                <div class="flex-grow">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">What's the idea?</label>
                    <input type="text" id="ideaInput" placeholder="Enter a brief description..." 
                        class="w-full h-11 px-4 rounded-lg border border-slate-200 bg-white text-slate-700 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                </div>
                <div class="flex-none pt-6 md:pt-6">
                    <button id="addIdeaBtn" class="h-11 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm rounded-lg transition-all duration-200 btn-indigo-shadow active:transform active:scale-95">
                        Add Idea
                    </button>
                </div>
            </div>
            <p id="errorMessage" class="text-rose-500 text-xs mt-3 hidden">Please fill out both fields to add an idea.</p>
        </section>

        <!-- List Area: Dashboard Interface -->
        <main class="p-8 list-area max-h-[480px] overflow-y-auto bg-white">
            <div id="ideasList" class="space-y-4">
                <!-- Initial Empty State -->
                <div id="emptyState" class="py-12 flex flex-col items-center justify-center text-center">
                    <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
                    </div>
                    <h3 class="text-slate-900 font-semibold">No ideas yet</h3>
                    <p class="text-slate-500 text-sm max-w-[240px] mt-1">Start the conversation by adding your first idea above.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userSelect = document.getElementById('userSelect');
            const ideaInput = document.getElementById('ideaInput');
            const addIdeaBtn = document.getElementById('addIdeaBtn');
            const ideasList = document.getElementById('ideasList');
            const emptyState = document.getElementById('emptyState');
            const errorMessage = document.getElementById('errorMessage');

            const addIdea = () => {
                const user = userSelect.value;
                const idea = ideaInput.value.trim();

                if (!user || !idea) {
                    errorMessage.classList.remove('hidden');
                    return;
                }

                errorMessage.classList.add('hidden');

                if (emptyState) {
                    emptyState.remove();
                }

                // Create Row Card
                const card = document.createElement('div');
                card.className = 'animate-entry bg-white border border-slate-100 p-5 rounded-xl flex items-center justify-between hover:border-indigo-200 hover:bg-slate-50/30 transition-all group';
                
                card.innerHTML = `
                    <div class="flex flex-col gap-1">
                        <h4 class="text-slate-800 font-semibold text-[15px] leading-tight">${idea}</h4>
                        <div class="flex items-center gap-2">
                            <span class="text-slate-400 text-xs">suggested by</span>
                            <span class="text-slate-600 text-xs font-medium bg-slate-100 px-2 py-0.5 rounded-md">${user}</span>
                        </div>
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 transition-opacity">
                        <button class="delete-btn p-2 text-slate-300 hover:text-rose-500 transition-colors" title="Remove idea">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                `;

                // Delete logic
                card.querySelector('.delete-btn').addEventListener('click', () => {
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        card.remove();
                        if (ideasList.children.length === 0) {
                            location.reload(); // Simple way to restore empty state for this demo
                        }
                    }, 200);
                });

                ideasList.insertBefore(card, ideasList.firstChild);

                // Reset inputs
                ideaInput.value = '';
                ideaInput.focus();
            };

            addIdeaBtn.addEventListener('click', addIdea);
            ideaInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addIdea();
            });
        });
    </script>
</body>
</html>
